<nav class="bg-white border-b-2 border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <!-- Logo and Brand -->
      <div class="flex items-center gap-3 cursor-pointer" (click)="navigateHome()">
        <div class="w-10 h-10 bg-gradient-to-br from-gray-900 to-gray-800 rounded-xl flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-gray-900">Invensystem</span>
      </div>

      <!-- Navigation Links -->
      <div class="flex items-center gap-6">
        <button 
          (click)="navigateHome()" 
          [class.text-gray-900]="isActive('home')"
          [class.text-gray-600]="!isActive('home')"
          class="font-medium hover:text-gray-900 transition-colors"
        >
          Home
        </button>

        <button 
          *ngIf="isAuthenticated"
          (click)="navigateInventory()" 
          [class.text-gray-900]="isActive('inventory')"
          [class.text-gray-600]="!isActive('inventory')"
          class="font-medium hover:text-gray-900 transition-colors"
        >
          Inventory
        </button>

        <button 
          *ngIf="isAuthenticated"
          (click)="navigateSuppliers()" 
          [class.text-gray-900]="isActive('supplier')"
          [class.text-gray-600]="!isActive('supplier')"
          class="font-medium hover:text-gray-900 transition-colors"
        >
          Suppliers
        </button>

        <!-- User Info & Logout -->
        <div *ngIf="isAuthenticated" class="flex items-center gap-4 ml-4 pl-4 border-l-2 border-gray-200">
          <div class="text-right">
            <div class="text-sm font-medium text-gray-900">{{ username }}</div>
            <div class="text-xs text-gray-500">{{ userRole }}</div>
          </div>
          <button 
            (click)="onLogout()" 
            class="px-5 py-2 bg-gradient-to-r from-gray-900 to-gray-800 text-white rounded-xl hover:from-gray-800 hover:to-gray-700 transition-all font-medium shadow-lg"
          >
            Sign Out
          </button>
        </div>

        <!-- Login Button (if not authenticated) -->
        <button 
          *ngIf="!isAuthenticated" 
          (click)="router.navigate(['/login'])" 
          class="px-5 py-2 bg-gradient-to-r from-gray-900 to-gray-800 text-white rounded-xl hover:from-gray-800 hover:to-gray-700 transition-all font-medium shadow-lg"
        >
          Sign In
        </button>
      </div>
    </div>
  </div>
</nav>
